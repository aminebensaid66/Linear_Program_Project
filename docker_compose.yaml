version: "3.9"

services:
  python-solver:
    build:
      context: ./python-solver
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/solve/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
    networks:
      - or-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - PYTHON_SOLVER_URL=http://python-solver:8000
      - PORT=3000
    ports:
      - "3000:3000"
    depends_on:
      python-solver:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - or-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - or-network

networks:
  or-network:
    driver: bridge