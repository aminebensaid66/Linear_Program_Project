server {
  listen 80;
  server_name _;

  # Use Docker DNS so backend service IP changes (container restarts) are picked up.
  resolver 127.0.0.11 valid=10s;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    try_files $uri /index.html;
  }

  location /api/ {
    set $backend_upstream backend:3000;
    # Preserve the full incoming URI (e.g. /api/lp/health) when proxying.
    proxy_pass http://$backend_upstream$request_uri;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_read_timeout 90s;
  }
}